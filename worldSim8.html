<html>

<head>
	<title>WorldSim! 8</title>
	<script type="text/javascript" src="Chart.min.js"></script>
	<script type="text/javascript" src="worldSim8.js"></script>
</head>

<body>
	<form id="ControlPannel">
		<label for="iterationCount">Iterations:</label>
		<input id="iterationCount" type="number" min="1" step="1" value="100" />
		<input type="button" onClick="runIterationsFromInput();" value="Run Simulation" />
		<label for="enableLogging">Console Logging</label>
		<input id="enableLogging" type="checkbox" onChange="syncLoggingSetting();" />
		<br>
		<input type="button" onClick="simLog(agents[watchAgent].getPlan(5));" value="getPlan5" />
	</form>
	<form id="metricForm">
		<input type="radio" name="metric" value="price" checked onChange="updateCharts();">Price |
		<input type="radio" name="metric" value="quantity" onChange="updateCharts();">Quantity |
		<input type="radio" name="metric" value="supply" onChange="updateCharts();">Supply |
		<input type="radio" name="metric" value="demand" onChange="updateCharts();">Demand
	</form>
	<table border="1px">
		<tr>
			<td>
				<canvas id="region0Chart" width="800" height="600"></canvas>
			</td>
			<td>
				<canvas id="region1Chart" width="800" height="600"></canvas>
			</td>
		</tr>
		<tr>
			<td>
				<canvas id="region2Chart" width="800" height="600"></canvas>
			</td>
			<td>
				<canvas id="region3Chart" width="800" height="600"></canvas>
			</td>
		</tr>
	</table>
	<br>
	<table border="1px">
		<tr>
			<td>
				<canvas id="foodChart" width="800" height="600"></canvas>
			</td>
			<td>
				<canvas id="energyChart" width="800" height="600"></canvas>
			</td>
		</tr>
	</table>
</body>

</html>
