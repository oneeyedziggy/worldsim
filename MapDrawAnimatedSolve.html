		var genericNode = function(iname, iposition, iparent, istatus, idepth){
			this.name = iname;
			this.parent = iparent;
			this.depth = idepth || 0; //the depth of this node in the chain;
			this.position = iposition;
			this.aStarScore = undefined;
			this.position = iposition;
			this.status = istatus || 'unexplored'; //unexplored, explored, and open are valid states;
		};

		var bh = 400;

		var vcellcount = 40;

		var potentiallyUnconnectedVNodes = [];

		var vcutCount = Math.floor(hcellcount * vcellcount * (vcutRate));

		var cw = bw + (padding*2) + 1; 
		var ch = bh + (padding*2) + 1;
		//calc cell sizes from base map dimensions and desired cell counts in each dimension;

			//line x or y is below and/or right of point x or y;

			var killswitch = 0;

				//if you can't path from one end to the other of the removed node in 40 steps or fewer after removing it, put it back and try again on another random node

				//reset these

				//if you can't path from one end to the other of the removed node in 40 steps or fewer after removing it, put it back and try again on another random node

					console.log(JSON.stringify({'randx':randx,'randy':randy}));
					console.log(aStarFromTo(vStartNode, vEndNode, 40));
				};
				if(aStarFromTo(vStartNode, vEndNode, 40)[0] != 1){
					vlines[randx][randy][0] = true;
					vlines[randx][randy][1] = 0;
					randInc--; //this could introduce infinite loops;
					killswitch++;
				}	
			};
			
			//save current map to localStorage
			localStorage.setItem('hlines',JSON.stringify(hlines));
			localStorage.setItem('vlines',JSON.stringify(vlines));
		};

		function findNewOpenNodes(inputNode){
		//returns array of x,y,available w/o checking for non-negative x's and y's;
			if(inputNode.position){

					};

							if(debugOn){

							};

							};

							};
							newOpenNodes.push(new genericNode(nodeIndexNames[node],{'x':availableNodesUDRL[node][0],'y':availableNodesUDRL[node][1]}, inputNode, 'open', (inputNode.depth + 1))); 
						}else{
							if(debugOn){
								console.log('node already in exploredPositions list');
							};
						};
					}else{
						if(debugOn){
							console.log('node already in openPositions list');
						};
					};

				};

			if(debugOn){
				console.log('new nodes to add to open list: ');

			};

		};
		
		function findLowestOpenNode(inputNode, openNodes, exploredPositions, currentDepth){
			//calculate what the lowest score open node is for use later;
			if(openNodes.length == 0){
				var output = 'insufficient open paths';
			}else if(openNodes.length == 1){
				var lowestAstarScoreNode = openNodes[0];
				var output = lowestAstarScoreNode;
			}else{
				var lowestAstarScoreNode = {};
				var lowestAstarScore = 999999;
				var potentialNode={};
				for(var node in openNodes){
					node = openNodes[node];
					if(debugOn){
						console.log('considering the following node inside findLowestOpenNode');
						console.log(node);
					};
					if(exploredPositions.indexOf(JSON.stringify(node.position)) == -1){
						if(debugOn){
							console.log('this should only ever be -1 == '+ exploredPositions.indexOf(JSON.stringify(node.position)).toString());
						};
						var originalNodeaStarScore = node.aStarScore;
						if(!originalNodeaStarScore){
							//astar score = orthagonal dist traveled times diagonal dist to goal;
							node.aStarScore = node.aStarScore || (4*Math.sqrt(Math.pow((node.position.x - inputNode.position.x),2) + Math.pow((node.position.y - inputNode.position.y),2))*1) + node.depth;
							//node.aStarScore = node.aStarScore || Math.abs(node.position.x - inputNode.position.x) + Math.abs(node.position.y - inputNode.position.y) + node.depth;
							if((node.position.x == 10 && node.position.y == 10)||(node.position.x == 20 && node.position.y == 20)||(node.position.x == 30 && node.position.y == 30)){
								
								if(debugOn){
									console.log('preexisting node.aStarScore = '+originalNodeaStarScore);
								};
								//console.log(JSON.stringify(node.position) + ': node.aStarScore=' + node.aStarScore.toString() + '; distToDest=' + (2*Math.sqrt(Math.pow((node.position.x - inputNode.position.x),2) + Math.pow((node.position.y - inputNode.position.y),2))*1).toString() + '; node.depth=' + node.depth + '; node.status='+node.status);
							};
						}else{
							if(debugOn){
								//TODO not sure of this is necessary, may be part of another path, but may have a different astar score as part of this path but whatever got to it first is likely shortest... idk if this ever gets reached w/o overlap in open and explored;
								console.log('node already had astar score, not assigning new one');
							};
						};
						if((node.aStarScore < lowestAstarScore)||(node.aStarScore == lowestAstarScore && randrange(0,1) == 1)){
							lowestAstarScoreNode = node;
							lowestAstarScore = node.aStarScore;
						};
						
						var output = lowestAstarScoreNode;
						if(lowestAstarScoreNode == {} || lowestAstarScore == 999999){
							//you've reached a dead end/painted yourself into a corner and/or are likely stuck on an island isolated from the destination node.;
							output = 'error: NO OPEN NODES';
						};
					}else{
						if(debugOn){
							console.log('node already in explored list');
						};
					};
				};
			};
			return output;
		};
		
		//Response Codes:;
		// [0] = 0 - success, [1] = array of coordinates like: '{"x":0,"y":0}', path ordered start to finish;
		// [0] = 1 - success, [1] = string: reason for incomplete: max depth, no open nodes, etc.;
		function aStarFromTo(inputNode, destinationNode, maxDepth, currentDepth){
			numAstarCalls += 1;
			if(inputNode.parent){
				if(strokeOpenOn){
					strokePath(inputNode.position, inputNode.parent.position, 'orange');
				};
				//strokePath(inputNode.position, inputNode.parent.position, 'yellow');
				if(inputNode.parent.parent && strokeExploredOn){
					strokePath(inputNode.parent.position, inputNode.parent.parent.position, 'green');
				};
			};
			
			
			maxDepth = maxDepth || 100;
			currentDepth = currentDepth || 0;
			//remove the input node from open nodes;
			if(debugOn){ //on the first node this does fuckall;
				console.log('inputNode is at position ' + openNodes.indexOf(inputNode) + ' of open nodes');
				
				console.log('removing the following node from open nodes');
				console.log(inputNode);
			};
			openNodes.splice(openNodes.indexOf(inputNode), 1); 
			
			if(debugOn){ //on the first node this does fuckall;

			};
			if(debugOn){

			};
			//why the fuck doesn't this work unless I do it twice?;
			openPositions.splice(openPositions.indexOf(JSON.stringify(inputNode.position), 1));
			openPositions.splice(openPositions.indexOf(JSON.stringify(inputNode.position), 1));
			if(debugOn){
				console.log('BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB');		
				console.log(openPositions.indexOf(JSON.stringify(inputNode.position)));
				console.log(openPositions);	
			};
	 
			inputNode.status = 'explored';
			exploredPositions.push(JSON.stringify(inputNode.position));
			if(debugOn){ 
				console.log('explored positions after adding inputNode:');
				console.log(exploredPositions);
			};
			//concat a new list of open nodes based on the input node;
			var newOpenNodes = findNewOpenNodes(inputNode);
			if(debugOn){
				console.log('newOpenNodes: ');
				console.log(newOpenNodes);
				console.log('newOpenNodes length = '+newOpenNodes.length.toString());
				for(var node in newOpenNodes){
					console.log('newOpenNodes['+node.toString()+']');
					console.log(newOpenNodes[node]);
				};
			};
			if(debugOn){
				console.log('open nodes list before add: ');
				console.log(openNodes);
				console.log('b4 open nodes length = '+openNodes.length.toString());
				for(var node in openNodes){
					console.log('b4 openNodes['+node.toString()+']');
					console.log(openNodes[node]);
				};
			};
			openNodes = openNodes.concat(newOpenNodes);
			if(debugOn){
				console.log('open nodes list after add: ');
				console.log(openNodes);
				console.log('openNodes[0]');
				console.log(openNodes[0]);
				console.log('open nodes length = '+openNodes.length.toString());
				console.log('exploredPositions length = '+exploredPositions.length.toString());
				for(var node in openNodes){
					console.log('openNodes['+node.toString()+']');
					console.log(openNodes[node]);
				};
				for(var node in exploredPositions){
					console.log('exploredPositions['+node.toString()+']');
					console.log(exploredPositions[node]);
				};
			};
			if(exploredPositions.length == 0){
				console.log('error: exploredPositions was empty inside aStarFromTo()');
				console.log(exploredPositions);
				return [ 0, 'error: exploredPositions was empty inside aStarFromTo()'];
			};
			
			if(openNodes.length == 0){
				//console.log('error: openNodes was empty inside aStarFromTo()');
					
				if(debugOn){
					console.log(openNodes);
				};
				return [ 0, 'openNodes was empty, so there are no more valid nodes (inside aStarFromTo())'];
			};
			var lowestAstarScoreNode = findLowestOpenNode(destinationNode, openNodes, exploredPositions, currentDepth);
						
			if(lowestAstarScoreNode == undefined){
				if(debugOn){
					console.log('lowestAstarScoreNode was undefined, so there were no more valid, unexplored nodes');
				};
				return [ 0, 'lowestAstarScoreNode was undefined, so there were no more valid, unexplored nodes (inside aStarFromTo())'];
			}else if(typeof lowestAstarScoreNode == 'string' && lowestAstarScoreNode.indexOf('error') > -1){
				return [ 0, lowestAstarScoreNode];
			};
			
			//evaluate whether at end or max depth and do the needful;
			if((JSON.stringify(lowestAstarScoreNode.position) == JSON.stringify(destinationNode.position))){
				currentNode = lowestAstarScoreNode;
				if(debugOn){
					console.log("current traveled : "+currentNode.depth.toString());
				};
				currentNode.name += ".endNode";
				var output = [currentNode.name + ' ' + JSON.stringify(currentNode.position)];
				var outputAsNodes = [currentNode];
				while(currentNode.parent){
					//prepend current node info since we're going backwards;
					output.unshift(currentNode.parent.name + ' ' + JSON.stringify(currentNode.parent.position));
					outputAsNodes.unshift(currentNode.parent);
					currentNode = currentNode.parent;
				};
				if(debugOn){
					console.log("current long depth : "+currentDepth.toString());
				};
				var currpos = outputAsNodes[0].position;
				if(strokePathOn){
					for(var node in outputAsNodes){
						node = outputAsNodes[node];
						strokePath(node.position, currpos, 'red');
						currpos = node.position;
					};
				};
				return [ 1, output];
			}else if(currentDepth >= maxDepth){ //lowestAstarScoreNode.depth;
				var currentNode = lowestAstarScoreNode;
				output = 'Max Depth Reached';
				if(debugOn){
					
					console.log('Last Explored Node: ('+currentNode.name + ' ' + JSON.stringify(currentNode.position)+ ')');
				};
				//return the path so-far;
				//while(currentNode.parent){
				//	//prepend current node info since we're going backwards;
				//	output.unshift(currentNode.parent.name + ' ' + JSON.stringify(currentNode.parent.position));
				//	currentNode = currentNode.parent;
				//};
				return [ 0, output];
			}else{
				//if you're not at the goal and lower than max steps, ;
				//TODO:modify this to minimize "depth" and bring it closer to path length.;
				//fast, not as cool to watch //880-950 //730-750;
				
				//console.log('currentDepth:'+currentDepth);
				if(openNodes.length == 0){
					return [ 0, 'no more open nodes'];
				};
				
				if(slowMode){
					setTimeout(function(){aStarFromTo(lowestAstarScoreNode , destinationNode, maxDepth, (currentDepth+1))},30);
				}else{
					//not returning a status code here b/c all other returns are status code, and will pass back up the chain;
					return aStarFromTo(lowestAstarScoreNode , destinationNode, maxDepth, (currentDepth+1));
				};
				//slow/cinematic;
				//
			};
			
		};
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		function strokePath(pos1, pos2, color){
			if(color != 'red'){
				//color = '#'+Math.floor(Math.random()*16777215).toString(16);
			};
			if(pos1.x == pos2.x || pos1.y == pos2.y){
				context.strokeStyle = color;//'#FF0000';//'#'+Math.floor(Math.random()*16777215).toString(16);
				context.beginPath();
				context.lineWidth = 3;
				context.moveTo( (pos1.x * cellW) + padding + 0.5, (pos1.y * cellH) + padding + 0.5);
				context.lineTo( (pos2.x * cellW) + padding + 0.5, (pos2.y * cellH) + padding + 0.5);
				context.stroke();
			}else{
				return "error: path is diagonal";
			};
		};

		//Draw out the hlines and vlines arrays;
		function drawBoard(){
			//for each position, biased half a pixel right, and incremented by sell width, draw vertical lines;
		    for (var x = 0.5; x <= bw-0.5; x += cellW) {
		        for (var xc = 0; xc < hcellcount-1; xc++){
					//if the line at the coord derived from the current x and cell width;
		            if(vlines[Math.floor((x-0.5)/cellW)][xc][0]){
					   context.strokeStyle = '#000000';
					   context.beginPath();
					   context.lineWidth = 1;
					   context.moveTo( x + padding, padding + (xc * cellW));

		            };
		        };
		    };
			
			//for each position, biased half a pixel right, and incremented by sell width, draw horizontal lines;
		    for (var y = 0.5; y <= bh-0.5; y += cellH) {

		            if(hlines[yc][Math.floor((y-0.5)/cellH)][0]){

					    context.beginPath();
					    context.lineWidth = 1;
		                context.moveTo(padding + (yc * cellH), y + padding);
		                context.lineTo(padding + ((yc+1) * cellH), y + padding);
					    context.stroke();
		            };
		        };
		    };

		};

		function getUDRLAvailability(x,y){
			//line x or y is below and/or right of point x or y;
			//so line x is right of point x, line x-1 is left of point x;
			//and line y is below point y, line y-1 is above point y;
			
			//output is x and y of available node and a bit for weather the node is available;
			if(x >= 0 && x < hcellcount && y >= 0 && y < vcellcount){
				var udrl = [];
				if(y>0){
					udrl.push([x,y-1,vlines[x][y-1][1]]); //up;
					//console.log('a1');
				}else{
					//console.log('a');
					udrl.push([x,y-1,-1]); //up;
				};
				if(y < (vcellcount-1)){
					udrl.push([x,y+1,vlines[x][y][1]]); //down;
					//console.log('b1');
				}else{
					//console.log('b');
					udrl.push([x,y+1,-1]); //down;
				};
				if(x < (hcellcount-1)){
					udrl.push([x+1,y,hlines[x][y][1]]); //right;
					//console.log('c1');
				}else{
					//console.log('c');
					udrl.push([x+1,y,-1]); //right;
				};
				if(x>0){
					udrl.push([x-1,y,hlines[x-1][y][1]]); //left;
					//console.log('d1');
				}else{
					//console.log('d');
					udrl.push([x-1,y,-1]); //left;
				};
			};
			return udrl;
		};
		
		function floodConnect(){	
			//add one since these are edges, not cells;
			var hColBase = hcellcount + 1;
			var vColBase = vcellcount + 1;
			//multiply b/c there's a cell in each column of each row;
			var hCellTotal = hColBase * vColBase;
			var vCellTotal = hCellTotal;
			//reduce by cut rate;
			var hCellActual = hCellTotal * (1-hcutRate);
			var vCellActual = vCellTotal * (1-vcutRate);
			//sum;
			var hvExpectedTotal = hCellActual + vCellActual;
		
			var initialPoint = {x:0,y:0};			
			var openSet = [{x:0,y:0}];
			var currUDRL = [];
			var currX = 0;
			var currY = 0;
			var currExploredVal = 0;
			var floodedTotal = 0;
			var override = 0;
			var start = (new Date).getTime();
			while(floodedTotal < hvExpectedTotal){
				floodedTotal = 0;
				currExploredVal = 0;

				while(openSet.length > 0 && override < 10){
				console.log(openSet);
					override++;
					for(var i=0;i<openSet.length;i++){ //for all openset;
						currX = openSet[i].x;
						currY = openSet[i].y;
						currUDRL = getUDRLAvailability(currX,currY);
						for(var j=0;j<4;j++){ //and each adjacent node to the openset;
							//if unexplored, add to open set;
							console.log(openSet);
							if(currUDRL[j][2] === currExploredVal){
								//progress the node to the next exploredness level (which should also prevent it from being added to the open set again.);
								
								//line x or y is below and/or right of point x or y;
								//so line x is right of point x, line x-1 is left of point x;
								//and line y is below point y, line y-1 is above point y;
								
								if(j === 0){
									if(hlines[currUDRL[j][0]][currUDRL[j][1]-1][1] != undefined){
										hlines[currUDRL[j][0]][currUDRL[j][1]-1][1] += 1;
									};
									if(hlines[currX][currY-1][1] != undefined){
										hlines[currX][currY-1][1] += 1;
									};
								}else if(j === 1){
									if(hlines[currUDRL[j][0]][currUDRL[j][1]][1] != undefined){
										hlines[currUDRL[j][0]][currUDRL[j][1]][1] += 1;
									};
									if(hlines[currX][currY][1] != undefined){
										hlines[currX][currY][1] += 1;
									};
								}else if(j === 2){
									if(vlines[currUDRL[j][0]-1][currUDRL[j][1]][1] != undefined){
										vlines[currUDRL[j][0]-1][currUDRL[j][1]][1] += 1;
									};
									if(typeof vlines[currX-1][currY][1] != undefined){
										vlines[currX-1][currY][1] += 1;
									};
								}else if(j === 3){
									if(vlines[currUDRL[j][0]][currUDRL[j][1]][1] != undefined){
										vlines[currUDRL[j][0]][currUDRL[j][1]][1] += 1;
									};
									if(vlines[currX][currY][1] != undefined){
										vlines[currX][currY][1] += 1;
									};
								};
								

								//if the node adjacent to the currentlyexamined node is open,; 
								openSet.push({x:currUDRL[j][0],y:currUDRL[j][1]});
							};
						};
						//remove the initial node from the open set;
						openSet.splice(i,1); 
						//if openSet was the last available, unexplored node, the floodable space has;
						//been saturated, stop and check if we got it all.;
					};
				};
				//TODO: start w/ list of all avail segments... then remove from as flooded to reduce search space.;
				//TODO: for all still un-explored line seg,;
				//   1  start there, ;
				//   2  flood island, removing each from unexplored, ;
				//	 3  if any adjacent unexplored h or v lines, grow into one;
				//	 4  else move to any adjacent node (adding self to blacklist) and repeat 3-4;
				
				//increment explored val and do another pass (necessary?) ;
				//(reset floodtotal);
				currExploredVal++;
			};
			
			var end = (new Date).getTime();
			return 'time: '+(end-start).toString();
		};
